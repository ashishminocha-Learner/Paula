name: PAULA
options:
  bundleIdPrefix: com.paula
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  # Only generate the PAULA scheme — suppresses the auto-generated
  # PAULAWidget scheme which can never run standalone on device.
  generateEmptyDirectories: true

packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: "0.9.19"

targets:
  PAULA:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PAULA
    resources:
      - path: PAULA/Resources/Assets.xcassets
      - path: PAULA/Resources/PrivacyInfo.xcprivacy
    settings:
      base:
        SWIFT_VERSION: 5.0
        DEVELOPMENT_TEAM: ""
        PRODUCT_BUNDLE_IDENTIFIER: com.paula.app
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: PAULA/Resources/Info.plist
        SWIFT_STRICT_CONCURRENCY: targeted
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: ZIPFoundation
      - target: PAULAWidget
    entitlements:
      path: PAULA/PAULA.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.paula.app
    info:
      path: PAULA/Resources/Info.plist
      properties:
        NSMicrophoneUsageDescription: "PAULA records audio conversations so you can transcribe and summarize them. Recording only happens when you tap the Record button."
        NSSpeechRecognitionUsageDescription: "PAULA uses on-device speech recognition to transcribe your recordings without sending audio to a server. This is optional — you can also use the Whisper API instead."
        UIBackgroundModes:
          - audio
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLName: com.paula.app
            CFBundleURLSchemes:
              - paula
        UIDeviceFamily: [1]
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations: {}

  PAULAWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PAULAWidget
      - path: PAULA/Shared
    settings:
      base:
        SWIFT_VERSION: 5.0
        DEVELOPMENT_TEAM: ""
        PRODUCT_BUNDLE_IDENTIFIER: com.paula.app.widget
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: PAULAWidget/Info.plist
        SWIFT_STRICT_CONCURRENCY: targeted
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: PAULAWidget/PAULAWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.paula.app

  PAULATests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PAULATests
    dependencies:
      - target: PAULA
    settings:
      base:
        SWIFT_VERSION: 5.0

# Explicit schemes — suppresses auto-generated PAULAWidget scheme.
# The widget is built and embedded automatically when running PAULA.
schemes:
  PAULA:
    build:
      targets:
        PAULA: all
        PAULAWidget: [build]  # built as dependency, not run standalone
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PAULATests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
